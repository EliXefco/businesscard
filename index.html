<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Virtual business card" />
  <title>Eli Worldon | Business Card</title>
  <style>
    :root {
      --bg: #000000;
      --card: rgba(10, 10, 10, 0.82);
      --text: #ffffff;
      --muted: #cfcfcf;
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius: 24px;
      --max-width: 460px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .background-logo {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.82)), url('company-logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: min(70vw, 600px);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-width);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 28px 24px 24px;
      text-align: center;
    }

    .profile-wrap {
      display: flex;
      justify-content: center;
      margin-top: -6px;
      margin-bottom: 20px;
    }

    .profile-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      background: #111;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .position {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .details {
      margin-top: 26px;
      display: grid;
      gap: 12px;
    }

    .detail-link {
      display: block;
      width: 100%;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.98rem;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      word-break: break-word;
    }

    .detail-link:hover,
    .detail-link:focus-visible {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.22);
      outline: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: #ffffff;
      color: #000000;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 170px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
      opacity: 0.92;
      outline: none;
    }

    .button.secondary {
      background: transparent;
      color: #ffffff;
    }

    .plus-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #b3b3b3;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 22px 16px 18px;
        border-radius: 20px;
      }

      .profile-image {
        width: 100px;
        height: 100px;
      }

      .actions {
        gap: 10px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="background-logo" aria-hidden="true"></div>

  <main class="card" aria-label="Virtual business card">
    <div class="profile-wrap">
      <img class="profile-image" src="profile.jpg" alt="Profile photo of Eli Worldon" />
    </div>

    <h1>Eli Worldon</h1>
    <p class="position">Research Engineer</p>
  <p class="business">Xefco Pty Ltd.</p>
    
    <section class="details" aria-label="Contact details">
      <a class="detail-link" href="mailto:e.worldon@xefco.com">e.worldon@xefco.com</a>
      <a class="detail-link" href="https://www.xefco.com" target="_blank" rel="noopener noreferrer">www.xefco.com</a>
    </section>

    <div class="actions">
      <button class="button" id="addContactBtn" type="button">
        <svg class="plus-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        Add Contact
      </button>


    </div>

    <p class="footer-note">Tap “Add Contact” to save this card to your phone or computer.</p>
  </main>

  <script>
    const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Eli Worldon
N:Worldon;Eli;;;
ORG:Xefco
TITLE:Research Engineer
EMAIL;TYPE=INTERNET;TYPE=WORK:e.worldon@xefco.com
URL:https://www.xefco.com
PHOTO;VALUE=URI:profile.jpg
END:VCARD`;

    document.getElementById('addContactBtn').addEventListener('click', () => {
      const blob = new Blob([vCardData], { type: 'text/vcard;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'your-name-contact.vcf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>
